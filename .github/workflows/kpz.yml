name: Build KPZ

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kpz:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Build KPZ
        id: build
        run: |
          kpz="$(./scripts/build-kpz)"
          echo "kpz=$kpz" >> "$GITHUB_OUTPUT"
          ls -lh "$kpz"

      - name: Upload KPZ artifact
        uses: actions/upload-artifact@v4
        with:
          name: koha-plugin-patron-natural-search-kpz
          path: ${{ steps.build.outputs.kpz }}
          if-no-files-found: error

      - name: Attach KPZ to tag release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"
          kpz="${{ steps.build.outputs.kpz }}"

          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release upload "$tag" "$kpz" --repo "$repo" --clobber
          else
            gh release create "$tag" "$kpz" \
              --repo "$repo" \
              --title "$tag" \
              --notes "Automated KPZ build for $tag"
          fi
